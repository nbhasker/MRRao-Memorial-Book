<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prof M Rammohan Rao Memorial</title>
  <link rel="icon" href="data:,">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at center, #555 0%, #222 55%, #111 100%);
    }

    #app {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: radial-gradient(circle at center, #555 0%, #222 55%, #111 100%);
    }

    #toolbar {
      height: 56px;
      background: linear-gradient(#1d1d1d, #090909);
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      box-sizing: border-box;
      box-shadow: 0 2px 12px rgba(0,0,0,.6);
      z-index: 10;
      position: relative;
      white-space: nowrap;
    }

    #title {
      font-weight: 700;
      margin-right: auto;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 30vw;
    }

    button {
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 5px;
      padding: 7px 9px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #555;
    }

    input {
      width: 64px;
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #777;
      text-align: center;
    }

    #pageInfo, #zoomInfo {
      min-width: 78px;
      text-align: center;
      color: #ddd;
      font-size: 14px;
    }

    #mainArea {
      height: calc(100vh - 56px);
      display: flex;
    }

    #thumbPanel {
      width: 170px;
      overflow-y: auto;
      background: #111;
      border-right: 1px solid #444;
      box-shadow: 3px 0 12px rgba(0,0,0,.5);
    }

    #thumbs {
      padding: 8px;
    }

    .thumb {
      width: 132px;
      margin: 9px auto;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 4px;
      transition: 0.2s;
      background: #222;
      padding: 3px;
    }

    .thumb:hover {
      border-color: #4da3ff;
      transform: scale(1.03);
    }

    .thumb.selected {
      border-color: #ffcc00;
      background: #333;
    }

    .thumb img {
      width: 100%;
      display: block;
      background: white;
    }

    .thumbLabel {
      color: white;
      text-align: center;
      font-size: 12px;
      margin-top: 4px;
    }

    #viewer {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 2000px;
      overflow: auto;
      position: relative;
    }

    #bookWrap {
      transition: zoom 0.15s ease;
      transform-origin: center center;
    }

    #book {
      box-shadow: 0 18px 50px rgba(0,0,0,.75);
    }

    #book .page {
      background: #f8f4e8;
      box-shadow: inset 0 0 20px rgba(0,0,0,.18);
    }

    #book .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #f8f4e8;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1050px) {
      #title {
        max-width: 20vw;
      }

      button {
        padding: 6px 7px;
        font-size: 12px;
      }

      #pageInfo, #zoomInfo {
        min-width: 58px;
        font-size: 12px;
      }

      #thumbPanel {
        width: 130px;
      }

      .thumb {
        width: 96px;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="toolbar">
    <div id="title">Prof M Rammohan Rao Memorial</div>

    <button id="toggleThumbs">📑 Thumbnails</button>
    <button id="toggleViewBtn">📖 Single Page</button>
    <button id="fullscreenBtn">⛶ Full Screen</button>

    <button id="firstBtn">⏮ First</button>
    <button id="prevBtn">◀ Previous</button>
    <button id="nextBtn">Next ▶</button>
    <button id="lastBtn">Last ⏭</button>

    <span id="pageInfo"></span>

    <span>Go to</span>
    <input id="pageInput" type="number" min="1">
    <button id="goBtn">Go</button>

    <button id="zoomOutBtn">−</button>
    <span id="zoomInfo">100%</span>
    <button id="zoomInBtn">+</button>
    <button id="zoomResetBtn">Reset</button>
  </div>

  <div id="mainArea">
    <div id="thumbPanel">
      <div id="thumbs"></div>
    </div>

    <div id="viewer">
      <div id="bookWrap">
        <div id="book"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const BOOK_TITLE = "Prof M Rammohan Rao Memorial";
  const PAGE_COUNT = 302;

  let zoom = 1.0;
  let singlePageMode = window.innerWidth < 1200;

  const MIN_ZOOM = 0.6;
  const MAX_ZOOM = 2.5;
  const ZOOM_STEP = 0.1;

  function pageUrl(pageNumber) {
    return "Pages/Page" + String(pageNumber).padStart(3, "0") + ".jpg";
  }

  $("#title").text(BOOK_TITLE);
  $("#pageInput").attr("max", PAGE_COUNT);

  for (let i = 1; i <= PAGE_COUNT; i++) {
    const url = pageUrl(i);

    $("#book").append(`
      <div class="page">
        <img src="${url}" alt="Page ${i}" decoding="sync">
      </div>
    `);

    $("#thumbs").append(`
      <div class="thumb" data-page="${i}">
        <img src="${url}" alt="Thumbnail ${i}" loading="lazy">
        <div class="thumbLabel">Page ${i}</div>
      </div>
    `);
  }

  function calculateBookSize() {
    const toolbarHeight = 56;
    const thumbWidth = $("#thumbPanel").is(":visible") ? $("#thumbPanel").outerWidth() : 0;

    const maxW = (window.innerWidth - thumbWidth) * 0.92;
    const maxH = (window.innerHeight - toolbarHeight) * 0.92;

    const pageRatio = 3 / 4;
    const pagesAcross = singlePageMode ? 1 : 2;

    let bookH = maxH;
    let bookW = bookH * pageRatio * pagesAcross;

    if (bookW > maxW) {
      bookW = maxW;
      bookH = bookW / (pageRatio * pagesAcross);
    }

    return {
      width: Math.round(bookW),
      height: Math.round(bookH)
    };
  }

  function resizeBook() {
    if (!$("#book").data("turn")) return;
    const newSize = calculateBookSize();
    $("#book").turn("size", newSize.width, newSize.height);
  }

function applyZoom() {
  $("#bookWrap").css({
    "zoom": zoom,
    "transform": "none"
  });

  $("#zoomInfo").text(Math.round(zoom * 100) + "%");
}

  function updatePageInfo() {
    const page = $("#book").turn("page");

    $("#pageInfo").text(`Page ${page} of ${PAGE_COUNT}`);
    $("#pageInput").val(page);

    $(".thumb").removeClass("selected");

    const selected = $(`.thumb[data-page="${page}"]`);
    selected.addClass("selected");

    if (selected.length) {
      selected[0].scrollIntoView({
        block: "nearest",
        behavior: "smooth"
      });
    }
  }

  function updateViewButton() {
    $("#toggleViewBtn").text(singlePageMode ? "📚 Two Page" : "📖 Single Page");
  }

  function updateFullscreenButton() {
    $("#fullscreenBtn").text(document.fullscreenElement ? "⛶ Exit Full Screen" : "⛶ Full Screen");
  }

  function toggleFullscreen() {
    const app = document.getElementById("app");

    if (!document.fullscreenElement) {
      if (app.requestFullscreen) {
        app.requestFullscreen();
      } else if (app.webkitRequestFullscreen) {
        app.webkitRequestFullscreen();
      } else if (app.msRequestFullscreen) {
        app.msRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
    }
  }

  const size = calculateBookSize();

  $("#book").turn({
    width: size.width,
    height: size.height,
    autoCenter: true,
    display: singlePageMode ? "single" : "double",
    gradients: true,
    acceleration: true,
    elevation: 50,
    when: {
      turned: updatePageInfo
    }
  });

  updatePageInfo();
  updateViewButton();
  updateFullscreenButton();
  applyZoom();

  $("#thumbs").on("click", ".thumb", function() {
    const page = parseInt($(this).data("page"), 10);
    $("#book").turn("page", page);
  });

  $("#toggleThumbs").on("click", function() {
    $("#thumbPanel").toggle();
    setTimeout(resizeBook, 50);
  });

  $("#toggleViewBtn").on("click", function() {
    const currentPage = $("#book").turn("page");

    singlePageMode = !singlePageMode;

    $("#book").turn("display", singlePageMode ? "single" : "double");
    $("#book").turn("page", currentPage);

    updateViewButton();
    resizeBook();
  });

  $("#fullscreenBtn").on("click", toggleFullscreen);

  document.addEventListener("fullscreenchange", function() {
    updateFullscreenButton();
    setTimeout(resizeBook, 100);
  });

  document.addEventListener("webkitfullscreenchange", function() {
    updateFullscreenButton();
    setTimeout(resizeBook, 100);
  });

  $("#firstBtn").on("click", () => $("#book").turn("page", 1));
  $("#prevBtn").on("click", () => $("#book").turn("previous"));
  $("#nextBtn").on("click", () => $("#book").turn("next"));
  $("#lastBtn").on("click", () => $("#book").turn("page", PAGE_COUNT));

  $("#goBtn").on("click", () => {
    const p = parseInt($("#pageInput").val(), 10);
    if (p >= 1 && p <= PAGE_COUNT) {
      $("#book").turn("page", p);
    }
  });

  $("#pageInput").on("keydown", e => {
    if (e.key === "Enter") $("#goBtn").click();
  });

  $("#zoomInBtn").on("click", () => {
    zoom = Math.min(MAX_ZOOM, +(zoom + ZOOM_STEP).toFixed(2));
    applyZoom();
  });

  $("#zoomOutBtn").on("click", () => {
    zoom = Math.max(MIN_ZOOM, +(zoom - ZOOM_STEP).toFixed(2));
    applyZoom();
  });

  $("#zoomResetBtn").on("click", () => {
    zoom = 1.0;
    applyZoom();
  });

  $("#viewer").on("wheel", function(e) {
    if (!e.ctrlKey) return;

    e.preventDefault();

    if (e.originalEvent.deltaY < 0) {
      zoom = Math.min(MAX_ZOOM, +(zoom + ZOOM_STEP).toFixed(2));
    } else {
      zoom = Math.max(MIN_ZOOM, +(zoom - ZOOM_STEP).toFixed(2));
    }

    applyZoom();
  });

  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;

    if (e.key === "ArrowLeft") $("#book").turn("previous");
    if (e.key === "ArrowRight") $("#book").turn("next");
    if (e.key === "Home") $("#book").turn("page", 1);
    if (e.key === "End") $("#book").turn("page", PAGE_COUNT);

    if (e.key === "v" || e.key === "V") {
      $("#toggleViewBtn").click();
    }

    if (e.key === "f" || e.key === "F") {
      toggleFullscreen();
    }

    if (e.key === "+" || e.key === "=") {
      zoom = Math.min(MAX_ZOOM, +(zoom + ZOOM_STEP).toFixed(2));
      applyZoom();
    }

    if (e.key === "-" || e.key === "_") {
      zoom = Math.max(MIN_ZOOM, +(zoom - ZOOM_STEP).toFixed(2));
      applyZoom();
    }

    if (e.key === "0") {
      zoom = 1.0;
      applyZoom();
    }
  });

let startX = 0;
let startY = 0;

$("#viewer").on("pointerdown", function(e) {

  if (e.pointerType === "mouse")
      return;

  startX = e.clientX;
  startY = e.clientY;
});

$("#viewer").on("pointerup", function(e) {

  if (e.pointerType === "mouse")
      return;

  const dx = e.clientX - startX;
  const dy = e.clientY - startY;

  if (Math.abs(dx) > 60 && Math.abs(dy) < 80) {

    if (dx < 0)
      $("#book").turn("next");
    else
      $("#book").turn("previous");
  }
});

  window.addEventListener("resize", resizeBook);
</script>
</body>
</html>
